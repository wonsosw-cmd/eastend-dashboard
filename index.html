(function adaptGASData() {
  if (!DATA) return;
  Object.keys(DATA).forEach(function(viewKey) {
    var view = DATA[viewKey];
    if (!view) return;

    // --- S1 Adapter ---
    if (view.s1 && !view.s1.revenue) {
      var s1 = view.s1;
      var mkMetric = function(cum) {
        return {
          cumulative: cum || 0,
          target: 0, progress: 0,
          m1cum: 0, m1pct: 0, m1total: 0,
          m2cum: 0, m2pct: 0, m2total: 0,
          m12cum: 0, m12pct: 0, m12total: 0,
          ly3cum: 0, ly3pct: 0, ly3total: 0
        };
      };
      view.s1 = {
        revenue: mkMetric(s1.curRev || s1.curCum),
        transaction: mkMetric(s1.curCum)
      };
    }

    // --- S2 Adapter ---
    if (view.s2 && view.s2.current && !view.s2.rows) {
      var cur = view.s2.current || [];
      var prev = view.s2.previous || [];
      var dayNames = ['(?)','(?)','(?)','(?)','(?)','(?)','(?)'];
      var fmtDate = function(dStr) {
        var parts = dStr.split('/');
        var m = parseInt(parts[0]), d = parseInt(parts[1]);
        var dt = new Date(2026, m - 1, d);
        return m + '.' + d + dayNames[dt.getDay()];
      };
      var dates_cw = cur.map(function(d) { return fmtDate(d.date); });
      var dates_pw = prev.map(function(d) { return fmtDate(d.date); });
      var cwVals = cur.map(function(d) { return d.value || 0; });
      var pwVals = prev.map(function(d) { return d.value || 0; });
      var cwTotal = cwVals.reduce(function(a,b) { return a+b; }, 0);
      var pwTotal = pwVals.reduce(function(a,b) { return a+b; }, 0);
      var pctVals = cwVals.map(function(v,i) { return pwVals[i] > 0 ? Math.round(v / pwVals[i] * 100) : 0; });
      var totalPct = pwTotal > 0 ? Math.round(cwTotal / pwTotal * 100) : 0;

      view.s2 = {
        dates_cw: dates_cw,
        dates_pw: dates_pw,
        _singleBrand: true,
        rows: [
          { label: '??', type: 'total', data: cwVals.concat([cwTotal]) },
          { label: '??', type: 'total', data: pwVals.concat([pwTotal]) },
          { label: '???', type: 'pct', data: pctVals.concat([totalPct]) }
        ]
      };
    }

    // --- S4 Adapter ---
    if (view.s4 && view.s4.current && !view.s4.channels) {
      var stores = view.s4.current || [];
      var prevStores = view.s4.previous || [];
      var dayNames4 = ['(?)','(?)','(?)','(?)','(?)','(?)','(?)'];
      var s4dates = [];
      if (stores.length > 0 && stores[0].daily && stores[0].daily.length > 0) {
        s4dates = stores[0].daily.map(function(d) {
          var parts = d.date.split('/');
          var m = parseInt(parts[0]), dd = parseInt(parts[1]);
          var dt = new Date(2026, m - 1, dd);
          return m + '.' + dd + dayNames4[dt.getDay()];
        });
      }

      // Build prev lookup by code
      var prevMap = {};
      prevStores.forEach(function(ps) { prevMap[ps.code] = ps; });

      // Group by brand then distribution
      var brandGroups = {};
      stores.forEach(function(st) {
        var b = st.brand || 'unknown';
        if (!brandGroups[b]) brandGroups[b] = {};
        var dist = st.distribution || 'etc';
        if (!brandGroups[b][dist]) brandGroups[b][dist] = [];
        brandGroups[b][dist].push(st);
      });

      var channels = [];
      var grandCw = new Array(s4dates.length).fill(0);
      var grandPw = 0;

      // Build hierarchy: brand(depth0) > distribution(depth1) > store(depth2)
      Object.keys(brandGroups).forEach(function(brandName) {
        var brandCw = new Array(s4dates.length).fill(0);
        var brandPwTotal = 0;
        var brandChildren = [];

        Object.keys(brandGroups[brandName]).forEach(function(distName) {
          var storeList = brandGroups[brandName][distName];
          var distCw = new Array(s4dates.length).fill(0);
          var distPwTotal = 0;
          var distChildren = [];

          storeList.forEach(function(st) {
            var cwDays = st.daily ? st.daily.map(function(d) { return d.value || 0; }) : new Array(s4dates.length).fill(0);
            var cwSum = cwDays.reduce(function(a,b) { return a+b; }, 0);
            var ps = prevMap[st.code];
            var pwSum = ps && ps.daily ? ps.daily.reduce(function(a,d) { return a + (d.value || 0); }, 0) : 0;
            var pct = pwSum > 0 ? Math.round(cwSum / pwSum * 100) : 0;
            cwDays.forEach(function(v,i) { distCw[i] += v; });
            distPwTotal += pwSum;
            distChildren.push({ depth: 2, label: st.store || st.channel || st.code, data: cwDays.concat([cwSum, pwSum, pct]) });
          });

          var distCwSum = distCw.reduce(function(a,b) { return a+b; }, 0);
          var distPct = distPwTotal > 0 ? Math.round(distCwSum / distPwTotal * 100) : 0;
          distCw.forEach(function(v,i) { brandCw[i] += v; });
          brandPwTotal += distPwTotal;

          brandChildren.push({ depth: 1, label: distName, data: distCw.concat([distCwSum, distPwTotal, distPct]) });
          distChildren.forEach(function(c) { brandChildren.push(c); });
        });

        var brandCwSum = brandCw.reduce(function(a,b) { return a+b; }, 0);
        var brandPct = brandPwTotal > 0 ? Math.round(brandCwSum / brandPwTotal * 100) : 0;
        brandCw.forEach(function(v,i) { grandCw[i] += v; });
        grandPw += brandPwTotal;

        channels.push({ depth: 0, label: brandName, data: brandCw.concat([brandCwSum, brandPwTotal, brandPct]) });
        brandChildren.forEach(function(c) { channels.push(c); });
      });

      view.s4 = { dates: s4dates, channels: channels };
    }
  });
})();

let s4State = {

  searchText: ''
};

function resetS4State(channels) {
  s4State.allChannels = channels || [];
  s4State.sortKey = 'sum-desc';
  s4State.selected = new Set(channels.map((_,i) => i));
  s4State.pickerOpen = false;
  s4State.searchText = '';
}

function getFilteredChannels() {
  const ch = s4State.allChannels;
  let filtered = ch.filter((_, i) => s4State.selected.has(i));
  if (s4State.searchText.trim()) {
    const q = s4State.searchText.trim().toLowerCase();
    filtered = filtered.filter(r => r.label.toLowerCase().includes(q));
  }
  if (s4State.sortKey !== 'none') {
    const colMap = {
      'sum-desc': {col:7, dir:-1}, 'sum-asc': {col:7, dir:1},
      'prev-desc': {col:8, dir:-1}, 'prev-asc': {col:8, dir:1},
      'pct-desc': {col:9, dir:-1}, 'pct-asc': {col:9, dir:1}
    };
    const {col, dir} = colMap[s4State.sortKey];

    // Top-down hierarchical sort:
    // 1. Build tree: group items by parent
    // 2. Sort siblings at each level by sort key
    // 3. Flatten back preserving parent?children order
    const allCh = s4State.allChannels;

    // Tag each item with its original index
    const tagged = filtered.map(r => ({row: r, origIdx: allCh.indexOf(r)}));

    // Build groups: depth 0 are roots, children follow their parent
    function buildTree(items) {
      const roots = [];
      let currentD0 = null, currentD1 = null, currentD2 = null;

      items.forEach(item => {
        const d = item.row.depth;
        if (d === 0) {
          currentD0 = {item, children: []};
          roots.push(currentD0);
          currentD1 = null; currentD2 = null;
        } else if (d === 1 && currentD0) {
          currentD1 = {item, children: []};
          currentD0.children.push(currentD1);
          currentD2 = null;
        } else if (d === 2 && currentD1) {
          currentD2 = {item, children: []};
          currentD1.children.push(currentD2);
        } else if (d === 3 && currentD2) {
          currentD2.children.push({item, children: []});
        } else if (d === 1) {
          currentD1 = {item, children: []};
          roots.push(currentD1);
          currentD2 = null;
        }
      });
      return roots;
    }

    const sortVal = node => (node.item.row.data[col] || 0);
    function sortTree(nodes) {
      nodes.sort((a,b) => (sortVal(a) - sortVal(b)) * dir);
      nodes.forEach(n => sortTree(n.children));
    }

    function flatten(nodes) {
      const out = [];
      nodes.forEach(n => {
        out.push(n.item.row);
        flatten(n.children).forEach(c => out.push(c));
      });
      return out;
    }

    const tree = buildTree(tagged);
    sortTree(tree);
    filtered = flatten(tree);
  }
  return filtered;
}

    html += `<td class="left scol scol-1">${row.label}</td>`;
    for (let i = 0; i < 9; i++) {
      html += `<td>${fmt(row.data[i])}</td>`;
    }
    const pv = row.data[9];
    if (pv !== undefined && pv !== null && pv !== 0) {
      html += `<td class="center ${pctClass(pv)}">${pv}%</td>`;
    } else {
      html += `<td class="center" style="color:#aaa;">-</td>`;
    }
    html += `</tr>`;
  });

  html += `</tbody></table>`;
  el.innerHTML = html;
}

// ---- ??? ??? ----
let _pickerJustToggled = false;

function togglePicker(evt) {
  if (evt) evt.stopPropagation();
  s4State.pickerOpen = !s4State.pickerOpen;
  const panel = document.getElementById('cpPanel');
  const btn = document.querySelector('.channel-picker-btn');
  if (panel) panel.classList.toggle('show', s4State.pickerOpen);
  if (btn) {
    btn.classList.toggle('open', s4State.pickerOpen);
    btn.querySelector('.arrow').textContent = s4State.pickerOpen ? '?' : '?';
  }
  if (s4State.pickerOpen) {
    _pickerJustToggled = true;
    setTimeout(() => { _pickerJustToggled = false; }, 50);
  }
}

function updatePickerBtnText() {
  const btn = document.querySelector('.channel-picker-btn span:first-child');
  const cnt = document.querySelector('.filter-count');
  const total = s4State.allChannels.length;
  const selCount = s4State.selected.size;
  if (btn) btn.textContent = selCount === total ? '?? ???' : selCount + '? ???';
  if (cnt) cnt.textContent = getFilteredChannels().length + '? ?? ?? ?';
}

function onCpToggle(idx, checked) {
  if (checked) s4State.selected.add(idx);
  else s4State.selected.delete(idx);
  updatePickerBtnText();
  renderS4Table();
}

function cpSelectAll() {
  s4State.selected = new Set(s4State.allChannels.map((_,i) => i));
  renderPickerList();
  updatePickerBtnText();
  renderS4Table();
}

function cpDeselectAll() {
  s4State.selected = new Set();
  renderPickerList();
  updatePickerBtnText();
  renderS4Table();
}

function cpBrandOnly(brand) {
  s4State.selected = new Set();
  let insideBrand = false;
  s4State.allChannels.forEach((ch, i) => {
    if (ch.depth === 0) { s4State.selected.add(i); return; }
    if (ch.depth === 1 && ch.label === brand) { insideBrand = true; s4State.selected.add(i); }
    else if (ch.depth === 1 && ch.label !== brand) { insideBrand = false; }
    else if (insideBrand) { s4State.selected.add(i); }
  });
  renderPickerList();
  updatePickerBtnText();
  renderS4Table();
}

function onS4SortChange(val) {
  s4State.sortKey = val;
  updatePickerBtnText();
  renderS4Table();
}

function onS4SortToggle(type) {
  const current = s4State.sortKey;
  if (type === 'sum') {
    s4State.sortKey = current === 'sum-desc' ? 'sum-asc' : 'sum-desc';
  } else if (type === 'prev') {
    s4State.sortKey = current === 'prev-desc' ? 'prev-asc' : 'prev-desc';
  } else if (type === 'pct') {
    s4State.sortKey = current === 'pct-desc' ? 'pct-asc' : 'pct-desc';
  }
  const sel = document.getElementById('s4Sort');
  if (sel) sel.value = s4State.sortKey;
  updatePickerBtnText();
  renderS4Table();
}

function onS4Search(val) {
  s4State.searchText = val;
  renderS4Table();
  updatePickerBtnText();
}

function onS4Reset() {
  resetS4State(s4State.allChannels);
  renderS4Toolbar();
  renderS4Table();
}

// ?? ?? ?? ? ??
document.addEventListener('click', e => {
  if (_pickerJustToggled) return;
  if (!s4State.pickerOpen) return;
  const picker = document.getElementById('channelPicker');
  if (picker && !picker.contains(e.target)) {
    s4State.pickerOpen = false;
    const panel = document.getElementById('cpPanel');
    const btn = document.querySelector('.channel-picker-btn');
    if (panel) panel.classList.remove('show');
    if (btn) {
      btn.classList.remove('open');
      const arrow = btn.querySelector('.arrow');
      if (arrow) arrow.textContent = '?';
    }
  }
});

// ============================================================
// MAIN RENDER
// ============================================================
function renderDashboard() {
  const view = getDataForView(currentMain, currentSub);
  const el = document.getElementById('dashboardContent');
  if (view.s4 && view.s4.channels) {
    resetS4State(view.s4.channels);
  }
  el.innerHTML = renderSection1(view.s1) + renderSection2(view.s2) + renderSection3() + renderSection4(view.s4);
  requestAnimationFrame(() => {
    initChart();
    renderS4Toolbar();
    renderS4Table();
  });
}

// ============================================================
// DATE DISPLAY (GAS ?? ?? ??)
// ============================================================
function setDate() {
  document.getElementById('headerDate').textContent = FIXED_DATE_STR + '  ??';
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  setDate();
  renderTabs();
  renderDashboard();
});
</script>
