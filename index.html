<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EASTEND 주간 매출 현황 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ========== RESET & GLOBAL ========== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:15px; }
body {
  font-family:'Noto Sans KR', sans-serif;
  background:#F0F2F5;
  color:#1a1a1a;
  min-height:100vh;
}

/* ========== HEADER ========== */
.header {
  background:linear-gradient(135deg, #0F1B3D 0%, #1B2E5C 100%);
  padding:24px 32px 0;
  position:sticky; top:0; z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,.25);
}
.header-top {
  display:flex; align-items:center; justify-content:space-between;
  padding-bottom:16px;
}
.logo {
  font-size:1.5rem; font-weight:900; color:#fff; letter-spacing:1px;
}
.logo span { color:#4A90D9; }
.header-date {
  color:rgba(255,255,255,.6); font-size:.85rem;
}

/* ========== TABS ========== */
.tab-row { display:flex; gap:4px; }
.main-tabs { margin-bottom:2px; }
.sub-tabs { background:rgba(255,255,255,.06); border-radius:8px 8px 0 0; padding:4px 4px 0; }
.tab-btn {
  padding:10px 28px; border:none; background:transparent;
  color:rgba(255,255,255,.55); font-family:inherit; font-size:.95rem; font-weight:500;
  cursor:pointer; border-radius:6px 6px 0 0; transition:all .2s;
  position:relative;
}
.tab-btn:hover { color:rgba(255,255,255,.85); background:rgba(255,255,255,.06); }
.tab-btn.active {
  color:#fff; font-weight:700; background:rgba(255,255,255,.12);
}
.tab-btn.active::after {
  content:''; position:absolute; bottom:0; left:20%; width:60%; height:3px;
  background:#4A90D9; border-radius:3px 3px 0 0;
}
.main-tabs .tab-btn.active { background:rgba(74,144,217,.18); }

/* ========== CONTENT ========== */
.content { max-width:1400px; margin:0 auto; padding:24px 24px 48px; }

/* ========== SECTION ========== */
.section {
  background:#fff; border-radius:12px; margin-bottom:20px;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  overflow:hidden;
}
.section-header {
  padding:16px 24px; font-size:1.1rem; font-weight:700; color:#0F1B3D;
  border-bottom:2px solid #E8EBF0;
  display:flex; align-items:center; gap:8px;
}
.section-header .badge {
  display:inline-block; background:#4A90D9; color:#fff; font-size:.7rem; font-weight:600;
  padding:2px 8px; border-radius:10px; letter-spacing:.5px;
}
.section-body { padding:20px 24px; overflow-x:auto; }

/* ========== SUMMARY TABLE (Section 1) ========== */
.summary-wrap { margin-bottom:24px; }
.summary-wrap:last-child { margin-bottom:0; }
.summary-label {
  font-size:.95rem; font-weight:600; color:#1B2E5C; margin-bottom:8px;
  padding-left:4px;
}

table.summary {
  width:100%; border-collapse:collapse;
}
table.summary th, table.summary td {
  border:1px solid #D8DCE3; padding:11px 14px; text-align:center;
  font-size:.9rem; vertical-align:middle;
}
table.summary th {
  background:#F5F7FA; font-weight:600; color:#1B2E5C;
}
.summary .big-num {
  font-size:1.45rem; font-weight:800; color:#0F1B3D;
}
.summary .highlight-blue {
  color:#4A90D9; font-weight:700; font-size:1.2rem;
}
.summary .sub-cell {
  text-align:left; padding:14px 16px; line-height:1;
}
.summary .sub-cell .row-item {
  display:flex; justify-content:space-between; align-items:center;
  font-size:.92rem; padding:6px 0;
}
.summary .sub-cell .row-item + .row-item {
  border-top:1px dashed #E0E3E8;
}
.summary .sub-cell .row-item .label {
  color:#666; font-size:.85rem; min-width:72px;
}
.summary .sub-cell .row-item .value {
  font-weight:700; color:#0F1B3D; font-size:1rem; text-align:right;
}
.summary .sub-cell .row-item.pct .value {
  font-size:.95rem; font-weight:700;
}
.summary .sub-cell .row-item.pct .value.pct-up { color:#E53935; }
.summary .sub-cell .row-item.pct .value.pct-down { color:#1E88E5; }

/* ========== DATA TABLE ========== */
table.data-tbl {
  width:100%; border-collapse:collapse; white-space:nowrap;
}
table.data-tbl th, table.data-tbl td {
  border:1px solid #D8DCE3; padding:9px 11px; font-size:.88rem;
  vertical-align:middle;
}
table.data-tbl th {
  background:#F5F7FA; font-weight:600; color:#1B2E5C; text-align:center;
}
table.data-tbl td { text-align:right; }
table.data-tbl td.left { text-align:left; }
table.data-tbl td.center { text-align:center; }
table.data-tbl .row-brand {
  background:#FAFBFC; font-weight:600; color:#0F1B3D;
}
table.data-tbl .row-sub { background:#fff; }
table.data-tbl .row-total {
  background:#EDF1F7; font-weight:700;
}
.pct-up { color:#E53935; font-weight:600; }
.pct-down { color:#1E88E5; font-weight:600; }
.row-depth0 td:first-child { font-weight:700; color:#0F1B3D; }
.row-depth1 td.left { padding-left:20px; font-weight:600; }
.row-depth2 td.left { padding-left:36px; font-weight:500; color:#444; }
.row-depth3 td.left { padding-left:52px; color:#555; }

/* ========== SUBTOTAL ROW COLORS (all views unified) ========== */
tr.subtotal-depth0 { background:#0F1B3D !important; }
tr.subtotal-depth0 td { color:#fff !important; font-weight:700; }
tr.subtotal-depth0 td.pct-up { color:#FF8A80 !important; }
tr.subtotal-depth0 td.pct-down { color:#82B1FF !important; }
tr.subtotal-depth1 { background:#1B2E5C !important; }
tr.subtotal-depth1 td { color:#fff !important; font-weight:700; }
tr.subtotal-depth1 td.pct-up { color:#FF8A80 !important; }
tr.subtotal-depth1 td.pct-down { color:#82B1FF !important; }
tr.subtotal-depth2 { background:#E8EDF5 !important; }
tr.subtotal-depth2 td { color:#1B2E5C !important; font-weight:600; }

/* ========== CHART ========== */
.chart-container {
  position:relative; width:100%; height:400px;
}
/* S3 body: flex layout for Y-axis fixed + chart scroll */
.s3-body { display:flex; position:relative; }
.s3-y-axis {
  display:none; /* hidden on desktop, shown on mobile */
}
.s3-scroll { flex:1; min-width:0; }
.chart-day-btn {
  font-family:'Noto Sans KR', sans-serif;
  font-size:.82rem; font-weight:500; padding:6px 16px;
  border:1px solid #CDD1D9; border-radius:6px;
  background:#fff; color:#666; cursor:pointer;
  transition:all .2s;
}
.chart-day-btn:hover { border-color:#4A90D9; color:#4A90D9; }
.chart-day-btn.active {
  background:#1B2E5C; color:#fff; border-color:#1B2E5C; font-weight:700;
}

/* ========== FILTER TOOLBAR ========== */
.filter-toolbar {
  display:flex; flex-wrap:wrap; gap:10px; align-items:center;
  margin-bottom:16px; padding:12px 16px;
  background:#F8F9FB; border-radius:8px; border:1px solid #E8EBF0;
}
.filter-group {
  display:flex; align-items:center; gap:6px;
}
.filter-group label {
  font-size:.8rem; font-weight:600; color:#1B2E5C; white-space:nowrap;
}
.filter-group select, .filter-group input[type="text"] {
  font-family:'Noto Sans KR', sans-serif;
  font-size:.8rem; padding:6px 10px;
  border:1px solid #CDD1D9; border-radius:6px; background:#fff;
  color:#1a1a1a; outline:none; transition:border-color .2s;
}
.filter-group select:focus, .filter-group input[type="text"]:focus {
  border-color:#4A90D9;
}
.filter-group select { min-width:130px; cursor:pointer; }
.filter-group input[type="text"] { width:180px; }

.channel-picker {
  position:relative; display:inline-block;
}
.channel-picker-btn {
  font-family:'Noto Sans KR', sans-serif;
  font-size:.8rem; padding:6px 12px;
  border:1px solid #CDD1D9; border-radius:6px; background:#fff;
  color:#1a1a1a; cursor:pointer; min-width:180px; text-align:left;
  display:flex; align-items:center; justify-content:space-between; gap:6px;
  transition:border-color .2s;
}
.channel-picker-btn:hover, .channel-picker-btn.open {
  border-color:#4A90D9;
}
.channel-picker-btn .arrow { font-size:.6rem; color:#888; }
.channel-picker-panel {
  display:none; position:absolute; top:100%; left:0; z-index:50;
  background:#fff; border:1px solid #D8DCE3; border-radius:8px;
  box-shadow:0 4px 16px rgba(0,0,0,.12); padding:8px 0;
  max-height:320px; overflow-y:auto; min-width:240px;
  margin-top:4px;
}
.channel-picker-panel.show { display:block; }
.channel-picker-panel .cp-actions {
  display:flex; gap:6px; padding:4px 12px 8px; border-bottom:1px solid #EEE;
}
.channel-picker-panel .cp-actions button {
  font-family:'Noto Sans KR', sans-serif;
  font-size:.72rem; padding:3px 10px; border:1px solid #CDD1D9;
  border-radius:4px; background:#F8F9FB; cursor:pointer; color:#1B2E5C;
  transition:all .15s;
}
.channel-picker-panel .cp-actions button:hover {
  background:#4A90D9; color:#fff; border-color:#4A90D9;
}
.cp-item {
  display:flex; align-items:center; gap:8px;
  padding:5px 12px; cursor:pointer; font-size:.8rem;
  transition:background .1s;
}
.cp-item:hover { background:#F0F4FA; }
.cp-item input[type="checkbox"] {
  accent-color:#4A90D9; width:15px; height:15px; cursor:pointer;
}
.cp-item.depth-0 { font-weight:700; color:#0F1B3D; }
.cp-item.depth-1 { padding-left:24px; font-weight:600; color:#1B2E5C; }
.cp-item.depth-2 { padding-left:36px; color:#444; }
.cp-item.depth-3 { padding-left:48px; color:#666; font-size:.78rem; }

.filter-count {
  font-size:.75rem; color:#4A90D9; font-weight:500;
}
.btn-reset-filter {
  font-family:'Noto Sans KR', sans-serif;
  font-size:.78rem; padding:6px 14px;
  border:1px solid #CDD1D9; border-radius:6px; background:#fff;
  cursor:pointer; color:#666; transition:all .15s;
}
.btn-reset-filter:hover {
  background:#E53935; color:#fff; border-color:#E53935;
}

/* ========== S1 MOBILE CARD COMPONENTS (hidden on desktop) ========== */
.s1-mobile { display:none; }

.mk-hero {
  background:linear-gradient(135deg, #0F1B3D 0%, #1B2E5C 100%);
  border-radius:8px; padding:16px; text-align:center; margin-bottom:8px;
}
.mk-hero-label { color:rgba(255,255,255,.7); font-size:.92rem; font-weight:500; margin-bottom:6px; }
.mk-hero-label span { font-size:.78rem; font-weight:400; }
.mk-hero-value { color:#fff; font-size:1.6rem; font-weight:800; letter-spacing:.5px; }

.mk-sub-row { display:flex; gap:6px; margin-bottom:10px; }
.mk-sub-item {
  flex:1; background:#F5F7FA; border:1px solid #E8EBF0; border-radius:6px;
  padding:10px 8px; text-align:center;
}
.mk-sub-label { font-size:.82rem; color:#666; margin-bottom:3px; font-weight:500; }
.mk-sub-value { font-size:1.05rem; font-weight:700; color:#0F1B3D; }
.mk-progress .mk-sub-value { font-size:1.2rem; }

.mc-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.mc-card {
  border:1px solid #D8DCE3; border-radius:8px; padding:12px;
  background:#fff;
}
.mc-title {
  font-size:.88rem; font-weight:700; color:#1B2E5C;
  margin-bottom:8px; padding-bottom:5px; border-bottom:1px solid #E8EBF0;
}
.mc-row {
  display:flex; justify-content:space-between; align-items:center;
  font-size:.88rem; padding:4px 0;
}
.mc-row + .mc-row { border-top:1px dashed #EEE; }
.mc-label { color:#666; font-size:.8rem; }
.mc-val { font-weight:700; color:#0F1B3D; font-size:.78rem; }

/* ========== RESPONSIVE ========== */

/* ---- Tablet ---- */
@media(max-width:1024px) {
  .content { max-width:100%; padding:20px 16px 40px; }
  .section-body { padding:16px; }
  table.summary th, table.summary td { padding:8px 10px; font-size:.8rem; }
  .summary .big-num { font-size:1.15rem; }
  .summary .highlight-blue { font-size:1.05rem; }
  .summary .sub-cell .row-item .label { font-size:.75rem; min-width:60px; }
  .summary .sub-cell .row-item .value { font-size:.85rem; }
}

/* ---- Mobile (≤768px) ---- */
@media(max-width:768px) {
  html { font-size:15px; }

  /* --- Header --- */
  .header { padding:12px 12px 0; }
  .header-top { padding-bottom:8px; }
  .logo { font-size:1.2rem; }
  .header-date { font-size:.85rem; }

  /* --- Tabs: scrollable pills --- */
  .tab-row { overflow-x:auto; -webkit-overflow-scrolling:touch; flex-wrap:nowrap; gap:2px; scrollbar-width:none; }
  .tab-row::-webkit-scrollbar { display:none; }
  .tab-btn { padding:9px 18px; font-size:.9rem; white-space:nowrap; flex-shrink:0; }
  .sub-tabs { padding:3px 3px 0; }

  /* --- Content --- */
  .content { padding:12px 8px 32px; }

  /* --- Sections --- */
  .section { border-radius:8px; margin-bottom:12px; }
  .section-header { padding:12px 14px; font-size:1rem; flex-wrap:wrap; gap:6px; }
  .section-header .badge { font-size:.72rem; padding:3px 8px; }
  .section-body { padding:12px 10px; overflow-x:auto; -webkit-overflow-scrolling:touch; }

  /* ===== S1: Toggle desktop/mobile ===== */
  .s1-desktop { display:none; }
  .s1-mobile { display:block; }
  .summary-label { font-size:.95rem; margin-bottom:8px; }

  /* ===== S2 & S4: horizontal scroll + sticky columns ===== */
  table.data-tbl {
    min-width:750px;
    border-collapse:separate; border-spacing:0;
  }
  /* Fix double borders in separate mode: remove all, add right+bottom only */
  table.data-tbl th, table.data-tbl td {
    padding:8px 10px; font-size:.95rem;
    border:none;
    border-right:1px solid #D8DCE3;
    border-bottom:1px solid #D8DCE3;
  }
  /* First row of thead needs top border */
  table.data-tbl thead tr:first-child th { border-top:1px solid #D8DCE3; }
  /* First column needs left border */
  table.data-tbl th:first-child, table.data-tbl td:first-child { border-left:1px solid #D8DCE3; }

  .row-depth1 td.left { padding-left:16px; }
  .row-depth2 td.left { padding-left:28px; }
  .row-depth3 td.left { padding-left:40px; }

  /* ---- Sticky left columns ---- */
  .scol { position:sticky; z-index:2; }
  .scol-1 { left:0; min-width:60px; }
  .scol-2 { left:60px; min-width:90px; }
  th.scol { z-index:3; background:#F5F7FA; }
  td.scol { background:#fff; }
  /* Sticky bg overrides for S2 row types */
  tr.row-total td.scol { background:#EDF1F7; }
  tr.row-sub td.scol { background:#fff; }
  /* Sticky bg overrides for S4 subtotal rows */
  tr.subtotal-depth0 td.scol { background:#0F1B3D !important; }
  tr.subtotal-depth1 td.scol { background:#1B2E5C !important; }
  tr.subtotal-depth2 td.scol { background:#E8EDF5 !important; }
  /* Ensure sticky border-right visible over scrolling cells */
  .scol { border-right:1px solid #C0C5CE !important; }
  /* Shadow on right edge of outermost sticky col */
  .scol-1::after, .scol-2::after {
    content:''; position:absolute; top:0; right:-6px; bottom:0; width:6px;
    background:linear-gradient(to right,rgba(0,0,0,.1),transparent);
    pointer-events:none;
  }

  /* ===== S3 Chart: fixed Y-axis + scrollable chart ===== */
  .s3-body.section-body {
    display:flex !important; flex-direction:row !important;
    overflow:hidden !important; /* BLOCK parent overflow-x:auto */
    padding:10px 0 10px 0;
  }
  .s3-y-axis {
    display:flex !important; flex-direction:column; justify-content:space-between;
    width:50px; flex-shrink:0; z-index:3;
    padding:32px 6px 40px 8px;
    text-align:right; font-size:.82rem; color:#555; font-weight:500;
    background:#fff; border-right:2px solid #D8DCE3;
    box-shadow:4px 0 8px rgba(0,0,0,.06);
  }
  .s3-y-axis .y-title {
    font-size:.72rem; color:#999; text-align:center;
    margin-bottom:4px; font-weight:600;
  }
  .s3-y-axis .y-tick { line-height:1.2; white-space:nowrap; }
  .s3-scroll {
    flex:1; min-width:0;
    overflow-x:auto !important; -webkit-overflow-scrolling:touch;
  }
  .s3-scroll .chart-container { min-width:1600px; height:420px; }
  .chart-day-btn { font-size:.88rem; padding:6px 14px; }

  /* ===== S4 Filter ===== */
  .filter-toolbar { padding:8px 10px; gap:8px; flex-direction:column; align-items:stretch; }
  .filter-group { flex-wrap:wrap; gap:4px; }
  .filter-group select { min-width:100%; font-size:.9rem; }
  .filter-group input[type="text"] { width:100%; font-size:.9rem; }
  .filter-group label { font-size:.88rem; width:100%; }
  .channel-picker-btn { min-width:100%; font-size:.9rem; }
  .channel-picker-panel { min-width:280px; }
  .btn-reset-filter { font-size:.88rem; padding:7px 14px; align-self:flex-start; }
  .filter-count { font-size:.85rem; }
}

/* ---- Small phone (≤420px) ---- */
@media(max-width:420px) {
  html { font-size:14px; }
  .header { padding:10px 8px 0; }
  .logo { font-size:1rem; }
  .tab-btn { padding:8px 14px; font-size:.82rem; }
  .content { padding:8px 5px 24px; }
  .section-header { padding:10px 10px; font-size:.92rem; }
  .section-body { padding:8px 6px; }

  /* S1 mobile cards: keep 2x2 grid */
  .mc-grid { grid-template-columns:1fr 1fr; gap:6px; }
  .mc-card { padding:9px; }
  .mc-title { font-size:.82rem; }
  .mc-row { font-size:.82rem; }
  .mc-label { font-size:.74rem; }
  .mk-hero-value { font-size:1.4rem; }
  .mk-sub-value { font-size:1rem; }

  table.data-tbl { min-width:650px; }
  table.data-tbl th, table.data-tbl td { font-size:.88rem; padding:7px 8px; }
  .s3-scroll .chart-container { min-width:1400px; height:380px; }
}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
  <div class="header-top">
    <div class="logo">EAST<span>END</span> &nbsp;주간 매출 현황</div>
    <div class="header-date" id="headerDate"></div>
  </div>
  <div class="main-tabs tab-row" id="mainTabs"></div>
  <div class="sub-tabs tab-row" id="subTabs"></div>
</div>

<!-- ===== CONTENT ===== -->
<div class="content" id="dashboardContent"></div>

<script>
// ============================================================
// ★ GAS 자동 주입 데이터
// 기본값 = 미리보기용 (브라우저에서 직접 열어도 에러 없음)

// ============================================================

// ============================================================
function getDataForView(main, sub) {
  let key = 'total';
  if (main === '전체') {
    if (sub === '오프라인') key = 'offline';
    else if (sub === '온라인') key = 'online';
  } else if (main === '오프라인') {
    if (sub === '시티브리즈 오프라인') key = 'cb_off';
    else if (sub === '아티드 오프라인') key = 'at_off';
    else key = 'offline';
  } else if (main === '온라인') {
    if (sub === '시티브리즈 온라인') key = 'cb_on';
    else if (sub === '아티드 온라인') key = 'at_on';
    else key = 'online';
  }
  const d = DATA[key] || DATA.total || {};
  return { key: key, s1: d.s1 || null, s2: d.s2 || null, s4: d.s4 || null };
}

// ============================================================
// RENDER TABS
// ============================================================
function renderTabs() {
  const mainEl = document.getElementById('mainTabs');
  const subEl = document.getElementById('subTabs');

  mainEl.innerHTML = Object.keys(TAB_CONFIG).map(k =>
    `<button class="tab-btn ${k===currentMain?'active':''}" onclick="selectMain('${k}')">${k}</button>`
  ).join('');

  const subs = TAB_CONFIG[currentMain];
  subEl.innerHTML = subs.map(s =>
    `<button class="tab-btn ${s===currentSub?'active':''}" onclick="selectSub('${s}')">${s}</button>`
  ).join('');
}

function selectMain(m) {
  currentMain = m;
  currentSub = TAB_CONFIG[m][0];
  renderTabs();
  renderDashboard();
}
function selectSub(s) {
  currentSub = s;
  renderTabs();
  renderDashboard();
}

function populateS3YAxis() {
  const yDiv = document.getElementById('s3YAxis');
  if (!yDiv || !chartInstance) return;
  const yScale = chartInstance.scales.y;
  if (!yScale) return;
  const ticks = yScale.ticks;

  // Get chart area boundaries to align Y-axis perfectly
  const chartArea = chartInstance.chartArea;
  const canvasH = chartInstance.canvas.offsetHeight;
  const topPad = chartArea.top;  // space above chart area (legend, etc.)
  const bottomPad = canvasH - chartArea.bottom; // space below chart area (x-axis labels)

  yDiv.style.paddingTop = topPad + 'px';
  yDiv.style.paddingBottom = bottomPad + 'px';

  // Build from top (max) to bottom (min)
  let html = '';
  for (let i = ticks.length - 1; i >= 0; i--) {
    html += `<div class="y-tick">${Number(ticks[i].value).toLocaleString()}</div>`;
  }
  yDiv.innerHTML = html;
}

let s4State = {
  sortKey: 'none',
  selected: new Set(),
  allChannels: [],
  pickerOpen: false,
  searchText: ''
};

function resetS4State(channels) {
  s4State.allChannels = channels || [];
  s4State.sortKey = 'sum-desc';
  s4State.selected = new Set(channels.map((_,i) => i));
  s4State.pickerOpen = false;
  s4State.searchText = '';
}

function getFilteredChannels() {
  const ch = s4State.allChannels;
  let filtered = ch.filter((_, i) => s4State.selected.has(i));
  if (s4State.searchText.trim()) {
    const q = s4State.searchText.trim().toLowerCase();
    filtered = filtered.filter(r => r.label.toLowerCase().includes(q));
  }
  if (s4State.sortKey !== 'none') {
    const colMap = {
      'sum-desc': {col:7, dir:-1}, 'sum-asc': {col:7, dir:1},
      'prev-desc': {col:8, dir:-1}, 'prev-asc': {col:8, dir:1},
      'pct-desc': {col:9, dir:-1}, 'pct-asc': {col:9, dir:1}
    };
    const {col, dir} = colMap[s4State.sortKey];

    // Top-down hierarchical sort:
    // 1. Build tree: group items by parent
    // 2. Sort siblings at each level by sort key
    // 3. Flatten back preserving parent→children order
    const allCh = s4State.allChannels;

    // Tag each item with its original index
    const tagged = filtered.map(r => ({row: r, origIdx: allCh.indexOf(r)}));

    // Build groups: depth 0 are roots, children follow their parent
    function buildTree(items) {
      const roots = [];
      let currentD0 = null, currentD1 = null, currentD2 = null;

      items.forEach(item => {
        const d = item.row.depth;
        if (d === 0) {
          currentD0 = {item, children: []};
          roots.push(currentD0);
          currentD1 = null; currentD2 = null;
        } else if (d === 1 && currentD0) {
          currentD1 = {item, children: []};
          currentD0.children.push(currentD1);
          currentD2 = null;
        } else if (d === 2 && currentD1) {
          currentD2 = {item, children: []};
          currentD1.children.push(currentD2);
        } else if (d === 3 && currentD2) {
          currentD2.children.push({item, children: []});
        } else if (d === 1) {
          currentD1 = {item, children: []};
          roots.push(currentD1);
          currentD2 = null;
        }
      });
      return roots;
    }

    const sortVal = node => (node.item.row.data[col] || 0);
    function sortTree(nodes) {
      nodes.sort((a,b) => (sortVal(a) - sortVal(b)) * dir);
      nodes.forEach(n => sortTree(n.children));
    }

    function flatten(nodes) {
      const out = [];
      nodes.forEach(n => {
        out.push(n.item.row);
        flatten(n.children).forEach(c => out.push(c));
      });
      return out;
    }

    const tree = buildTree(tagged);
    sortTree(tree);
    filtered = flatten(tree);
  }
  return filtered;
}

function renderS4Table() {
  const el = document.getElementById('s4TableWrap');
  if (!el) return;
  const view = getDataForView(currentMain, currentSub);
  const dates = view.s4.dates;
  const filtered = getFilteredChannels();

  let html = `<table class="data-tbl"><thead><tr>
    <th class="scol scol-1" style="min-width:180px;">구분 / 채널</th>`;
  dates.forEach(d => html += `<th>${d}</th>`);
  html += `<th style="background:#E8EBF0;cursor:pointer;" onclick="onS4SortToggle('sum')">합계 ⇅</th>`;
  html += `<th style="background:#E8EBF0;cursor:pointer;" onclick="onS4SortToggle('prev')">전주 합계 ⇅</th>`;
  html += `<th style="background:#E8EBF0;cursor:pointer;" onclick="onS4SortToggle('pct')">전주비 ⇅</th>`;
  html += `</tr></thead><tbody>`;

  if (filtered.length === 0) {
    html += `<tr><td colspan="${dates.length + 4}" class="center" style="padding:24px;color:#888;">조건에 맞는 데이터가 없습니다.</td></tr>`;
  }

  const isSubtotal = (row) => {
    const orig = s4State.allChannels;
    const origIdx = orig.indexOf(row);
    if (row.depth === 0) return 'subtotal-depth0';
    if (row.depth === 1) {
      // depth1이 하위(depth2)를 가진 경우에만 subtotal 처리
      if (origIdx >= 0 && origIdx + 1 < orig.length && orig[origIdx + 1].depth === 2) {
        return 'subtotal-depth1';
      }
      return '';
    }
    if (row.depth === 2) {
      if (origIdx >= 0 && origIdx + 1 < orig.length && orig[origIdx + 1].depth === 3) {
        return 'subtotal-depth2';
      }
    }
    return '';
  };

  filtered.forEach(row => {
    const depthClass = `row-depth${row.depth}`;
    const subtotalClass = isSubtotal(row);
    html += `<tr class="${depthClass} ${subtotalClass}">`;
    html += `<td class="left scol scol-1">${row.label}</td>`;
    for (let i = 0; i < 9; i++) {
      html += `<td>${fmt(row.data[i])}</td>`;
    }
    const pv = row.data[9];
    if (pv !== undefined && pv !== null && pv !== 0) {
      html += `<td class="center ${pctClass(pv)}">${pv}%</td>`;
    } else {
      html += `<td class="center" style="color:#aaa;">-</td>`;
    }
    html += `</tr>`;
  });

  html += `</tbody></table>`;
  el.innerHTML = html;
}

  const total = s4State.allChannels.length;
  const selCount = s4State.selected.size;
  if (btn) btn.textContent = selCount === total ? '전체 선택됨' : selCount + '개 선택됨';
  if (cnt) cnt.textContent = getFilteredChannels().length + '개 항목 표시 중';
}

function onCpToggle(idx, checked) {
  if (checked) s4State.selected.add(idx);
  else s4State.selected.delete(idx);
  updatePickerBtnText();
  renderS4Table();
}

function cpSelectAll() {
  s4State.selected = new Set(s4State.allChannels.map((_,i) => i));
  renderPickerList();
  updatePickerBtnText();
  renderS4Table();
}

function cpDeselectAll() {
  s4State.selected = new Set();
  renderPickerList();
  updatePickerBtnText();
  renderS4Table();
}

function cpBrandOnly(brand) {
  s4State.selected = new Set();
  let insideBrand = false;
  s4State.allChannels.forEach((ch, i) => {
    if (ch.depth === 0) { s4State.selected.add(i); return; }
    if (ch.depth === 1 && ch.label === brand) { insideBrand = true; s4State.selected.add(i); }
    else if (ch.depth === 1 && ch.label !== brand) { insideBrand = false; }
    else if (insideBrand) { s4State.selected.add(i); }
  });
  renderPickerList();
  updatePickerBtnText();
  renderS4Table();
}

function onS4SortChange(val) {
  s4State.sortKey = val;
  updatePickerBtnText();
  renderS4Table();
}

function onS4SortToggle(type) {
  const current = s4State.sortKey;
  if (type === 'sum') {
    s4State.sortKey = current === 'sum-desc' ? 'sum-asc' : 'sum-desc';
  } else if (type === 'prev') {
    s4State.sortKey = current === 'prev-desc' ? 'prev-asc' : 'prev-desc';
  } else if (type === 'pct') {
    s4State.sortKey = current === 'pct-desc' ? 'pct-asc' : 'pct-desc';
  }
  const sel = document.getElementById('s4Sort');
  if (sel) sel.value = s4State.sortKey;
  updatePickerBtnText();
  renderS4Table();
}

function onS4Search(val) {
  s4State.searchText = val;
  renderS4Table();
  updatePickerBtnText();
}

function onS4Reset() {
  resetS4State(s4State.allChannels);
  renderS4Toolbar();
  renderS4Table();
}

// 패널 외부 클릭 시 닫기
document.addEventListener('click', e => {
  if (_pickerJustToggled) return;
  if (!s4State.pickerOpen) return;
  const picker = document.getElementById('channelPicker');
  if (picker && !picker.contains(e.target)) {
    s4State.pickerOpen = false;
    const panel = document.getElementById('cpPanel');
    const btn = document.querySelector('.channel-picker-btn');
    if (panel) panel.classList.remove('show');
    if (btn) {
      btn.classList.remove('open');
      const arrow = btn.querySelector('.arrow');
      if (arrow) arrow.textContent = '▼';
    }
  }
});

// ============================================================
// MAIN RENDER
// ============================================================
function renderDashboard() {
  const view = getDataForView(currentMain, currentSub);
  const el = document.getElementById('dashboardContent');
  if (view.s4 && view.s4.channels) {
    resetS4State(view.s4.channels);
  }
  el.innerHTML = renderSection1(view.s1) + renderSection2(view.s2) + renderSection3() + renderSection4(view.s4);
  requestAnimationFrame(() => {
    initChart();
    renderS4Toolbar();
    renderS4Table();
  });
}

// ============================================================
// DATE DISPLAY (GAS 주입 날짜 사용)
// ============================================================
function setDate() {
  document.getElementById('headerDate').textContent = FIXED_DATE_STR + '  기준';
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  setDate();
  renderTabs();
  renderDashboard();
});
</script>
</body>
</html>
